<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Pecuária</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fa;
      color: #333;
    }
    .container {
      max-width: 420px;
      margin: 80px auto;
      padding: 32px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      color: #1f2937;
      text-align: center;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d2d6dc;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .error {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .success {
      background: #d1fae5;
      color: #166534;
      border: 1px solid #a7f3d0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login</h1>
    {% if erro %}
      <div class="alert error">{{ erro }}</div>
    {% endif %}
    {% if sucesso %}
      <div class="alert success">{{ sucesso }}</div>
    {% endif %}
   <form action="/api/login/" method="POST">
      <input type="text" name="usuario" placeholder="Usuário" required>
      <input type="password" name="senha" placeholder="Senha" required>
      <button type="submit">Entrar</button>
  </form>
  </div>
</body>
</html>
